<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词小助手 - 五年级英语下册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; background: white; border-radius: 3px; transition: width 0.3s ease; }
        .word-count { font-size: 16px; font-weight: 500; text-align: center; }
        .main-content { padding: 20px; }
        .word-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 24px; }
        .image-container { position: relative; width: 100%; height: 240px; overflow: hidden; }
        .word-image { width: 100%; height: 100%; object-fit: cover; }
        .image-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.3s ease; }
        .image-overlay.show-hint { opacity: 0; }
        .image-overlay::before { content: '👆 点击查看图片'; color: white; font-size: 16px; text-align: center; }
        .word-info { padding: 20px; text-align: center; }
        .word { font-size: 36px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .phonetic { font-size: 18px; color: #999; }
        .meaning-section { background: #f8f9fa; padding: 20px; text-align: center; display: none; }
        .meaning-section.show { display: block; }
        .meaning { font-size: 24px; font-weight: 600; color: #667eea; margin-bottom: 12px; }
        .example { font-size: 14px; color: #888; font-style: italic; }
        .action-buttons { display: flex; gap: 16px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { transform: scale(0.98); }
        .btn-forget { background: #fff0f0; color: #e74c3c; border: 2px solid #ffe0e0; }
        .btn-forget:hover { background: #ffe0e0; }
        .btn-remember { background: #e8f5e9; color: #27ae60; border: 2px solid #c8e6c9; }
        .btn-remember:hover { background: #c8e6c9; }
        .btn-icon { font-size: 24px; }
        .btn-text { font-size: 18px; }
        .show-answer { text-align: center; }
        .btn-show { background: transparent; color: #667eea; border: 2px dashed #667eea; padding: 12px 32px; border-radius: 25px; font-size: 16px; }
        .result-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .result-modal.show { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 40px; margin: 20px; text-align: center; max-width: 320px; }
        .modal-content h2 { font-size: 28px; color: #333; margin-bottom: 30px; }
        .result-stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 14px; color: #999; }
        .btn-restart { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 14px 48px; border-radius: 30px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="word-count"><span id="currentWord">1</span> / <span id="totalWords">20</span></div>
        </header>
        <main class="main-content">
            <div class="word-card">
                <div class="image-container">
                    <img id="wordImage" src="" alt="单词图片">
                    <div class="image-overlay" id="imageOverlay"></div>
                </div>
                <div class="word-info">
                    <div class="word" id="word">apple</div>
                    <div class="phonetic" id="phonetic">/ˈæpl/</div>
                </div>
                <div class="meaning-section" id="meaningSection">
                    <div class="meaning" id="meaning">苹果</div>
                    <div class="example" id="example">I eat an apple every day.</div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-forget" id="btnForget"><span class="btn-icon">😵</span><span class="btn-text">忘了</span></button>
                <button class="btn btn-remember" id="btnRemember"><span class="btn-icon">😊</span><span class="btn-text">认识</span></button>
            </div>
            <div class="show-answer" id="showAnswer"><button class="btn btn-show">显示答案</button></div>
        </main>
        <div class="result-modal" id="resultModal">
            <div class="modal-content">
                <h2>学习完成！</h2>
                <div class="result-stats">
                    <div class="stat-item"><span class="stat-value" id="correctCount">0</span><span class="stat-label">认识</span></div>
                    <div class="stat-item"><span class="stat-value" id="wrongCount">0</span><span class="stat-label">忘记</span></div>
                    <div class="stat-item"><span class="stat-value" id="accuracy">0%</span><span class="stat-label">正确率</span></div>
                </div>
                <button class="btn btn-restart" id="btnRestart">再来一遍</button>
            </div>
        </div>
    </div>
    <script>
        const words = [
            { word: 'apple', phonetic: '/ˈæpl/', meaning: '苹果', example: 'I eat an apple every day.', image: 'apple' },
            { word: 'banana', phonetic: '/bəˈnænə/', meaning: '香蕉', example: 'Monkeys like bananas.', image: 'banana' },
            { word: 'cat', phonetic: '/kæt/', meaning: '猫', example: 'The cat is sleeping.', image: 'cat' },
            { word: 'dog', phonetic: '/dɒɡ/', meaning: '狗', example: 'I have a pet dog.', image: 'dog' },
            { word: 'egg', phonetic: '/eɡ/', meaning: '鸡蛋', example: 'I eat an egg for breakfast.', image: 'egg' },
            { word: 'fish', phonetic: '/fɪʃ/', meaning: '鱼', example: 'Fish can swim.', image: 'fish' },
            { word: 'girl', phonetic: '/ɡɜːl/', meaning: '女孩', example: 'She is a happy girl.', image: 'girl' },
            { word: 'hand', phonetic: '/hænd/', meaning: '手', example: 'Wash your hands before dinner.', image: 'hand' },
            { word: 'ice', phonetic: '/aɪs/', meaning: '冰', example: 'The ice is cold.', image: 'ice' },
            { word: 'juice', phonetic: '/dʒuːs/', meaning: '果汁', example: 'I drink orange juice.', image: 'juice' },
            { word: 'kite', phonetic: '/kaɪt/', meaning: '风筝', example: 'We fly kites in spring.', image: 'kite' },
            { word: 'lion', phonetic: '/ˈlaɪən/', meaning: '狮子', example: 'The lion is strong.', image: 'lion' },
            { word: 'milk', phonetic: '/mɪlk/', meaning: '牛奶', example: 'Drink milk every day.', image: 'milk' },
            { word: 'notebook', phonetic: '/ˈnəʊtbʊk/', meaning: '笔记本', example: 'I write in my notebook.', image: 'notebook' },
            { word: 'orange', phonetic: '/ˈɒrɪndʒ/', meaning: '橙子', example: 'Orange is my favorite fruit.', image: 'orange' },
            { word: 'pencil', phonetic: '/ˈpensl/', meaning: '铅笔', example: 'I write with a pencil.', image: 'pencil' },
            { word: 'queen', phonetic: '/kwiːn/', meaning: '女王', example: 'The queen lives in a castle.', image: 'queen' },
            { word: 'rabbit', phonetic: '/ˈræbɪt/', meaning: '兔子', example: 'The rabbit has long ears.', image: 'rabbit' },
            { word: 'sun', phonetic: '/sʌn/', meaning: '太阳', example: 'The sun is bright.', image: 'sun' },
            { word: 'tree', phonetic: '/triː/', meaning: '树', example: 'There is a big tree in the yard.', image: 'tree' }
        ];
        let currentIndex = 0, correctCount = 0, wrongCount = 0, showAnswerFlag = false;
        const wordElement = document.getElementById('word');
        const phoneticElement = document.getElementById('phonetic');
        const meaningElement = document.getElementById('meaning');
        const exampleElement = document.getElementById('example');
        const imageElement = document.getElementById('wordImage');
        const imageOverlay = document.getElementById('imageOverlay');
        const meaningSection = document.getElementById('meaningSection');
        const progressFill = document.getElementById('progressFill');
        const currentWordSpan = document.getElementById('currentWord');
        const totalWordsSpan = document.getElementById('totalWords');
        const resultModal = document.getElementById('resultModal');
        const correctCountSpan = document.getElementById('correctCount');
        const wrongCountSpan = document.getElementById('wrongCount');
        const accuracySpan = document.getElementById('accuracy');
        function getImageUrl(imageName) {
            return `https://picsum.photos/seed/${imageName}/400/300`;
        }
        function showWord() {
            const word = words[currentIndex];
            wordElement.textContent = word.word;
            phoneticElement.textContent = word.phonetic;
            meaningElement.textContent = word.meaning;
            exampleElement.textContent = word.example;
            imageElement.src = getImageUrl(word.image);
            imageOverlay.classList.remove('show-hint');
            meaningSection.classList.remove('show');
            showAnswerFlag = false;
            updateProgress();
        }
        function updateProgress() {
            currentWordSpan.textContent = currentIndex + 1;
            totalWordsSpan.textContent = words.length;
            progressFill.style.width = ((currentIndex + 1) / words.length * 100) + '%';
        }
        function showResult() {
            const accuracy = Math.round((correctCount / words.length) * 100);
            correctCountSpan.textContent = correctCount;
            wrongCountSpan.textContent = wrongCount;
            accuracySpan.textContent = accuracy + '%';
            resultModal.classList.add('show');
        }
        function nextWord() {
            if (currentIndex < words.length - 1) { currentIndex++; showWord(); }
            else { showResult(); }
        }
        document.getElementById('btnRemember').addEventListener('click', function() {
            if (!showAnswerFlag) { meaningSection.classList.add('show'); showAnswerFlag = true; setTimeout(nextWord, 1000); }
            else { correctCount++; nextWord(); }
        });
        document.getElementById('btnForget').addEventListener('click', function() {
            if (!showAnswerFlag) { meaningSection.classList.add('show'); showAnswerFlag = true; setTimeout(nextWord, 1000); }
            else { wrongCount++; nextWord(); }
        });
        document.querySelector('.btn-show').addEventListener('click', function() {
            meaningSection.classList.add('show');
            showAnswerFlag = true;
        });
        imageOverlay.addEventListener('click', function() { imageOverlay.classList.add('show-hint'); });
        document.getElementById('btnRestart').addEventListener('click', function() {
            currentIndex = 0; correctCount = 0; wrongCount = 0;
            resultModal.classList.remove('show'); showWord();
        });
        showWord();
    </script>
</body>
</html>
